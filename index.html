<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disaster Help</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff5f5; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="h-full w-full overflow-auto flex flex-col">
   <header class="sticky top-0 bg-red-600 text-white px-4 py-3 z-40">
    <div class="text-lg font-bold">
     🆘 <span id="org-header">Disaster Relief</span>
    </div>
   </header>
   <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-6">
    <div class="bg-red-100 border-l-4 border-red-600 p-4 mb-6">
     <h1 id="emergency-title" class="text-2xl font-bold text-red-800 mb-2">Emergency Response</h1>
     <p id="urgent-message" class="text-red-700">We need your immediate support to help affected communities</p>
    </div>
    <div class="bg-white rounded p-4 mb-6 border border-gray-200">
     <h2 class="font-bold text-lg mb-4">Donate Now</h2>
     <div class="grid grid-cols-2 gap-3" id="donation-options"></div>
    </div>
    <div id="success-msg" class="hidden bg-green-100 border border-green-400 rounded p-4 text-center">
     <div class="text-3xl mb-2">
      ✓
     </div>
     <p class="font-bold text-green-800">Thank you for helping!</p>
     <p class="text-sm text-green-700 mt-1">Your contribution will save lives.</p>
    </div>
   </main>
  </div>
  <script>
const helps = [
  { id: 1, amount: 100, desc: "Emergency Food" },
  { id: 2, amount: 250, desc: "Medical Aid" },
  { id: 3, amount: 500, desc: "Shelter Kit" },
  { id: 4, amount: 1000, desc: "Complete Aid" },
];

let selected = null;

function render() {
  const grid = document.getElementById('donation-options');
  grid.innerHTML = '';
  helps.forEach(h => {
    const btn = document.createElement('button');
    btn.className = selected === h.id ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-800 hover:bg-gray-200';
    btn.classList.add('p-4', 'rounded', 'font-bold', 'text-sm', 'transition');
    btn.innerHTML = `<div class="text-xl">₹${h.amount}</div><div class="text-xs mt-1">${h.desc}</div>`;
    btn.onclick = () => donate(h.id);
    grid.appendChild(btn);
  });
}

function donate(id) {
  selected = id;
  render();
  document.getElementById('success-msg').classList.remove('hidden');
  setTimeout(() => {
    selected = null;
    render();
    document.getElementById('success-msg').classList.add('hidden');
  }, 2500);
}

const defaultConfig = {
  org_name: "Disaster Relief",
  emergency_title: "Emergency Response",
  urgent_message: "We need your immediate support to help affected communities"
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('org-header').textContent = c.org_name;
  document.getElementById('emergency-title').textContent = c.emergency_title;
  document.getElementById('urgent-message').textContent = c.urgent_message;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: () => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
  mapToEditPanelValues: (config) => new Map([
    ["org_name", config.org_name || defaultConfig.org_name],
    ["emergency_title", config.emergency_title || defaultConfig.emergency_title],
    ["urgent_message", config.urgent_message || defaultConfig.urgent_message]
  ])
});

render();
  </script>

</html>
