<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Donation</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafaf8; }
    .qty-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="h-full w-full overflow-auto flex flex-col"><!-- Header -->
   <header class="sticky top-0 bg-white border-b px-4 py-3 z-40">
    <div class="text-lg font-bold">
     ❤️ Help Foundation
    </div>
   </header><!-- Main -->
   <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-4">
    <h1 id="ngo-mission" class="text-2xl font-bold mb-2">Make a Difference Today</h1>
    <p id="ngo-description" class="text-sm text-gray-600 mb-6">Your donation helps us serve communities in need</p>
    <div class="bg-blue-50 border border-blue-200 rounded p-4 mb-6">
     <h2 class="font-bold text-lg mb-3">Choose Donation Amount</h2>
     <div class="grid grid-cols-2 gap-3" id="donation-options"></div>
    </div>
    <div id="donation-info" class="hidden bg-green-50 border border-green-200 rounded p-4 text-center">
     <div class="text-3xl mb-2">
      🙏
     </div>
     <p class="font-bold mb-1">Thank you for your generosity!</p>
     <p class="text-sm text-gray-600">Your donation of <span id="donation-amount" class="font-bold">₹0</span> will help us continue our mission.</p><button onclick="completeDonation()" class="mt-3 w-full bg-blue-600 text-white py-2 rounded font-bold text-sm">Complete Donation</button>
    </div>
   </main><!-- Toast -->
   <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded text-sm z-50 opacity-0 pointer-events-none transition-opacity"></div>
  </div>
  <script>
const donations = [
  { id: 1, amount: 100, cause: "Feed a Child" },
  { id: 2, amount: 250, cause: "School Supplies" },
  { id: 3, amount: 500, cause: "Medical Kit" },
  { id: 4, amount: 1000, cause: "Education Fund" },
];

let selectedDonation = null;

function renderDonations() {
  const grid = document.getElementById('donation-options');
  grid.innerHTML = '';
  donations.forEach(d => {
    const btn = document.createElement('button');
    btn.className = selectedDonation === d.id ? 'bg-blue-600 text-white border-2 border-blue-600' : 'bg-white border-2 border-gray-300 text-gray-800 hover:border-blue-400';
    btn.classList.add('p-3', 'rounded', 'font-bold', 'text-sm', 'transition');
    btn.innerHTML = `<div class="text-lg">₹${d.amount}</div><div class="text-xs mt-1">${d.cause}</div>`;
    btn.onclick = () => selectDonation(d.id, d.amount);
    grid.appendChild(btn);
  });
}

function selectDonation(id, amount) {
  selectedDonation = id;
  document.getElementById('donation-amount').textContent = '₹' + amount;
  document.getElementById('donation-info').classList.remove('hidden');
  renderDonations();
}

function completeDonation() {
  if (!selectedDonation) return;
  const donation = donations.find(d => d.id === selectedDonation);
  selectedDonation = null;
  document.getElementById('donation-info').classList.add('hidden');
  renderDonations();
  
  const toast = document.getElementById('toast');
  toast.textContent = '✓ Thank you! Your donation of ₹' + donation.amount + ' has been received.';
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 3000);
}

const defaultConfig = {
  ngo_name: "Help Foundation",
  ngo_mission: "Make a Difference Today",
  ngo_description: "Your donation helps us serve communities in need"
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('ngo-mission').textContent = c.ngo_mission;
  document.getElementById('ngo-description').textContent = c.ngo_description;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: () => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
  mapToEditPanelValues: (config) => new Map([
    ["ngo_name", config.ngo_name || defaultConfig.ngo_name],
    ["ngo_mission", config.ngo_mission || defaultConfig.ngo_mission],
    ["ngo_description", config.ngo_description || defaultConfig.ngo_description]
  ])
});

renderDonations();
  </script>

</html>
