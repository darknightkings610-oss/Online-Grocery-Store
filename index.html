 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelancing Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; }

 </head>
 <body class="h-full">
  <div class="h-full w-full overflow-auto flex flex-col">
   <header class="sticky top-0 bg-white text-gray-900 px-4 py-4 z-40 border-b border-gray-200">
    <div class="max-w-2xl mx-auto flex justify-between items-center">
     <div class="text-xl font-bold">
      💼 <span id="platform-name">WorkHub</span>
     </div>
     <div class="text-sm text-gray-600">
      Sign In
     </div>
    </div>
   </header>
   <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-6">
    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-8 mb-8 border border-blue-100">
     <h1 id="platform-tagline" class="text-3xl font-bold text-gray-900 mb-2">Connect with Top Talent</h1>
     <p class="text-gray-600 mb-6">Find freelancers for your projects or offer your services to businesses</p><button id="cta-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition">Get Started</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
     <div class="bg-white rounded-lg p-5 border border-gray-200 hover:shadow-md transition">
      <div class="text-3xl mb-2">
       👨‍💼
      </div>
      <h3 class="font-bold text-lg mb-1">For Clients</h3>
      <p class="text-sm text-gray-600">Post projects and hire skilled freelancers</p>
     </div>
     <div class="bg-white rounded-lg p-5 border border-gray-200 hover:shadow-md transition">
      <div class="text-3xl mb-2">
       💻
      </div>
      <h3 class="font-bold text-lg mb-1">For Freelancers</h3>
      <p class="text-sm text-gray-600">Browse jobs and grow your career</p>
     </div>
    </div>
    <div class="bg-white rounded-lg p-6 border border-gray-200 mb-6">
     <h2 class="font-bold text-lg mb-4">Featured Projects</h2>
     <div id="projects-list" class="space-y-3"></div>
    </div>
   </main>
  </div>
  <script>
const projects = [
  { id: 1, title: "Build E-commerce Website", budget: "$500-1000", skills: "React, Node.js" },
  { id: 2, title: "Mobile App UI Design", budget: "$300-600", skills: "Figma, UI/UX" },
  { id: 3, title: "WordPress Blog Setup", budget: "$200-400", skills: "WordPress" },
];

function renderProjects() {
  const list = document.getElementById('projects-list');
  list.innerHTML = projects.map(p => `
    <div class="bg-gray-50 p-4 rounded border border-gray-200 hover:bg-gray-100 transition cursor-pointer">
      <h3 class="font-bold text-gray-900">${p.title}</h3>
      <p class="text-sm text-gray-600 mt-1">${p.skills}</p>
      <p class="text-sm font-bold text-blue-600 mt-2">${p.budget}</p>
    </div>
  `).join('');
}

const defaultConfig = {
  platform_name: "WorkHub",
  platform_tagline: "Connect with Top Talent",
  cta_button: "Get Started"
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('platform-name').textContent = c.platform_name;
  document.getElementById('platform-tagline').textContent = c.platform_tagline;
  document.getElementById('cta-btn').textContent = c.cta_button;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: () => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
  mapToEditPanelValues: (config) => new Map([
    ["platform_name", config.platform_name || defaultConfig.platform_name],
    ["platform_tagline", config.platform_tagline || defaultConfig.platform_tagline],
    ["cta_button", config.cta_button || defaultConfig.cta_button]
  ])
});

renderProjects();
  </script>
